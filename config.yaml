pipeline:
  lookback_days: 21            # editable: 7, 14, 21, 28, ...
  max_sublink_depth: 1
  confidence_threshold: 0.7
  cache_retention_days: 28
  fetch_concurrency: 8
  http_timeout_seconds: 15
  # Nav link text patterns that indicate a content listing page.
  # Stage 1 scans <nav> for links whose text matches any of these (case-insensitive).
  # Matched links are crawled as listing pages; unmatched nav links are ignored.
  content_nav_patterns:
    - news
    - media release
    - media-release
    - media centre
    - community update
    - community news
    - publication
    - alert
    - event
    - consultation
    - press release
    - announcement
    - newsroom
    - bulletin
    - update
    - report
    - notice

paths:
  inbox: ./inbox
  cache: ./data/cache
  outputs: ./outputs
  db: ./data/pipeline.db
  source_registry: ./data/source_registry.json
  reference: ./reference

llm:
  primary: openai
  fallback: bedrock
  timeout_seconds: 10
  max_retries: 2

bedrock:
  region: ap-southeast-2
  cheap_model: anthropic.claude-3-5-haiku-20241022-v1:0
  quality_model: anthropic.claude-3-5-sonnet-20241022-v2:0

openai:
  cheap_model: gpt-4o-mini
  quality_model: gpt-4o

sections:
  - Water Reform
  - Urban Water Supply and Use
  - Rural Water Supply and Use
  - Wastewater and Water Reuse
  - Collection
  - Conservation
  - Water Rights
  - Waterways and Flood Mitigation
  - General Water Quality and Sustainability

jurisdictions:
  - National
  - Victoria
  - New South Wales
  - Queensland
  - Western Australia
  - South Australia
  - Tasmania
  - Australian Capital Territory
  - Northern Territory

