# Consolidated source registry for Stage 1 discovery.
#
# Each group shares (section, jurisdiction). Per-entry overrides are allowed.
#
# Per-entry fields:
#   url                required
#   requires_js        optional, bool, default false
#   sublink_patterns   optional, list[regex], default []
#   source_label       optional, str
#   section_priority   optional, "weak" | "strong", default "weak"
#                      "strong" → Stage 6 trusts the source's section/jurisdiction
#                      hints by default. Use for single-purpose regulators whose
#                      output reliably maps to one section + one jurisdiction.
#
# Note: Stage 1 tries RSS → sitemap (multiple paths + index recursion) → HTML
# listing in that order, so plain news-page URLs work — no need to find
# explicit RSS feed URLs.

groups:

  # ----------------------------------------------------------------------
  - section: Water Reform
    jurisdiction: National
    sources:
      - url: https://www.mdba.gov.au/news
        source_label: "MDBA — News and announcements"
        section_priority: strong
        sublink_patterns:
          - "\\.pdf$"
          - "/news/"
          - "/media-releases/"

      - url: https://www.dcceew.gov.au/about/news
        source_label: "DCCEEW — News"
        section_priority: strong
        sublink_patterns:
          - "\\.pdf$"
          - "/news/"
          - "/media-releases/"

      - url: https://www.legislation.gov.au/Latest
        source_label: "Federal Register of Legislation — Latest instruments"
        section_priority: weak  # cross-section feed; let LLM decide

      - url: http://www.bom.gov.au/water/
        source_label: "Bureau of Meteorology — Water"
        section_priority: strong

  # ----------------------------------------------------------------------
  - section: Water Reform
    jurisdiction: New South Wales
    sources:
      - url: https://www.waternsw.com.au/community-news/media-releases
        source_label: "WaterNSW — Media releases"
        section_priority: strong

      - url: https://water.dpie.nsw.gov.au/
        source_label: "NSW DCCEEW — Water"
        section_priority: strong

  # ----------------------------------------------------------------------
  - section: Water Rights
    jurisdiction: National
    sources:
      - url: https://www.mdba.gov.au/water-management/water-markets-and-trade
        source_label: "MDBA — Water markets and trade"
        section_priority: strong

      - url: http://www.bom.gov.au/water/market/
        source_label: "BoM — Water Market Information"
        section_priority: strong

  # ----------------------------------------------------------------------
  - section: Urban Water Supply and Use
    jurisdiction: Tasmania
    sources:
      - url: https://www.taswater.com.au/news/newsroom
        source_label: "TasWater — Newsroom"
        section_priority: strong
