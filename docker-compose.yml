services:
  prefect-server:
    image: prefecthq/prefect:2-python3.12
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_API_URL: http://localhost:4200/api
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4200/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline:
    build: .
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ./inbox:/app/inbox
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./reference:/app/reference:ro
      - ./config.yaml:/app/config.yaml:ro
    command: ["python", "main.py", "run"]

  watcher:
    build: .
    depends_on:
      - pipeline
    env_file: .env
    volumes:
      - ./inbox:/app/inbox
      - ./data:/app/data
    command: ["python", "main.py", "watch-inbox"]

  ui:
    build: .
    depends_on:
      - pipeline
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: ["streamlit", "run", "ui/streamlit_app.py", "--server.address=0.0.0.0"]
